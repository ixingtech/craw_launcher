<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        width: 1024px;
        height: 1024px;
        overflow: hidden;
        background: #fff8f1;
      }

      body {
        display: grid;
        place-items: center;
        font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
      }

      .tile {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        border-radius: 240px;
        background: #fff8f1;
        box-shadow: inset 0 0 0 8px rgba(236, 196, 166, 0.95);
      }

      .emoji {
        font-size: 520px;
        line-height: 1;
        transform: translateY(-8px);
      }
    </style>
  </head>
  <body>
    <div class="tile">
      <div class="emoji">🦞</div>
    </div>
  </body>
</html>
