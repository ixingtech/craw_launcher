name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      REPOSITORY: ${{ github.repository }}
      TAG_NAME: ${{ github.ref_name }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate signing secrets
        shell: bash
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm build

      - name: Build standalone CLI binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --bin claws-cli --features standalone-cli --release

      - name: Build zh-CN installer and release
        run: pnpm build:nsis:ci:zh-CN

      - name: Build en-US installer and release
        run: pnpm build:nsis:ci:en-US

      - name: Generate updater manifests
        shell: bash
        run: |
          VERSION_NO_V="${TAG_NAME#v}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          node tools/generate-updater-manifest.mjs zh-CN "$VERSION_NO_V" "$TAG_NAME" "$REPOSITORY" "$PUB_DATE"
          node tools/generate-updater-manifest.mjs en-US "$VERSION_NO_V" "$TAG_NAME" "$REPOSITORY" "$PUB_DATE"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/小龙虾启动器_*.exe
            src-tauri/target/release/小龙虾启动器_*.exe.sig
            src-tauri/target/release/craw-launcher_*.exe
            src-tauri/target/release/craw-launcher_*.exe.sig
            src-tauri/target/release/latest-zh-CN.json
            src-tauri/target/release/latest-en-US.json
